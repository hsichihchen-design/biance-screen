name: Binance 180K WARP Scanner

on:
  schedule:
    - cron: '0 */2 * * *'  # 系統排程：每 2 小時自動執行一次
  workflow_dispatch:       # 手動開關：允許我們在網頁上點擊按鈕強制測試

permissions:
  contents: write          # 賦予機器人把 JSON 存回 GitHub 的權限

jobs:
  scan-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Install Python Dependencies
        # 關鍵武裝：必須安裝 requests[socks] 才能支援 WARP 的 SOCKS5 代理協議
        run: pip install pandas requests[socks] ccxt

      - name: 4. Install and Connect Cloudflare WARP
        run: |
          # 匯入 Cloudflare 官方金鑰與來源
          curl -fsSL https://pkg.cloudflareclient.com/pubkey.gpg | sudo gpg --yes --dearmor --output /usr/share/keyrings/cloudflare-warp-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/cloudflare-warp-archive-keyring.gpg] https://pkg.cloudflareclient.com/ $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/cloudflare-client.list
          
          # 安裝 WARP 客戶端
          sudo apt-get update
          sudo apt-get install -y cloudflare-warp
          
          # 註冊並設定為 Proxy 模式 (只把爬蟲流量導出，避免 GitHub 主連線斷線)
          warp-cli --accept-tos registration new
          warp-cli --accept-tos mode proxy
          warp-cli --accept-tos connect
          
          # 等待隧道建立
          echo "等待 WARP 隧道連線中..."
          sleep 10
          
          # 測試是否成功穿透，印出目前的跳板 IP
          curl --socks5 127.0.0.1:40000 https://api.ipify.org
          echo ""

      - name: 5. Run Data Update (Through WARP Tunnel)
        env:
          # 將 Python 網路請求強制綁定到 WARP 的 40000 代理通訊埠
          HTTP_PROXY: socks5://127.0.0.1:40000
          HTTPS_PROXY: socks5://127.0.0.1:40000
          ALL_PROXY: socks5://127.0.0.1:40000
        run: python update_data.py

      - name: 6. Commit and Push Results
        run: |
          git config user.name "Cloudflare WARP Bot"
          git config user.email "actions@github.com"
          git add uptrend_results.json
          git commit -m "Auto-update via WARP: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "No changes to commit"
          git push
