name: Daily Taiwan Stock Screen

on:
  schedule:
    # 每 3 小時執行一次 (UTC 格式)
    # 換算台灣時間為 01:30, 04:30, 07:30, 10:30, 13:30, 16:30, 19:30, 22:30
    - cron: '30 */3 * * *'
  workflow_dispatch: # 允許手動點擊執行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Scan Script
        run: python update_data.py

      - name: Commit and Push JSON
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add uptrend_results.json
          git commit -m "Auto-update (1H Scan): $(date +'%Y-%m-%d %H:%M')" || exit 0
          git pull --rebase origin main  
          git push
